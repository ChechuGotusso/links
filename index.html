<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <meta name="theme-color" content="#F6F4F0">
  <title>Chechu Gotusso | Linktree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Raleway:wght@100;200;300;400&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light only;
      --cream: #F6F4F0;
      --cream-soft: #FBFAF7;
      --ink: #2B2B2B;
      --teal: #6B9E9A;
      --teal-dark: #4F827E;
      --teal-light: #BDD6D3;
      --teal-muted: #EAF3F2;
      --smoke: #8A918F;
      --shadow: rgba(87, 119, 116, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: light only;
        --cream: #F6F4F0;
        --cream-soft: #FBFAF7;
        --ink: #2B2B2B;
        --teal: #6B9E9A;
        --teal-dark: #4F827E;
        --teal-light: #BDD6D3;
        --teal-muted: #EAF3F2;
        --smoke: #8A918F;
        --shadow: rgba(87, 119, 116, 0.12);
      }

      html, body {
        background: var(--cream) !important;
        color: var(--ink) !important;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--cream) !important;
      color-scheme: light only;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--ink);
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -10%, rgba(189, 214, 211, 0.38), transparent 38%),
        linear-gradient(180deg, var(--cream-soft) 0%, var(--cream) 100%) !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.6rem 1.2rem 3rem;
      position: relative;
      overflow: hidden;
    }

    .bg-strokes {
      position: absolute;
      inset: 0;
      opacity: 0.04;
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo-wrap {
      width: 154px;
      height: 168px;
      margin-bottom: 0.28rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-monogram {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(61, 110, 106, 0.08));
    }

    .name {
      font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 200;
      font-size: clamp(32px, 7.8vw, 45px);
      letter-spacing: -0.035em;
      color: var(--ink);
      line-height: 1.05;
      margin-top: 0.08rem;
      font-kerning: normal;
      text-rendering: geometricPrecision;
    }

    .subtle-line {
      width: 86px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal-light), transparent);
      margin-top: 0.8rem;
    }

    .socials {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 0.5px solid var(--teal-light);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      text-decoration: none;
      color: var(--teal);
      box-shadow: 0 8px 22px var(--shadow);
      transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
      flex-shrink: 0;
    }

    .social-btn:hover {
      background: var(--teal-muted);
      border-color: var(--teal);
      transform: translateY(-2px);
    }

    .social-btn svg {
      width: 16px;
      height: 16px;
      fill: var(--teal);
      display: block;
    }

    .social-btn.whatsapp svg { fill: #4CAF79; }
    .social-btn.whatsapp { border-color: #A8D5B8; }
    .social-btn.whatsapp:hover { background: #EAF5EE; border-color: #4CAF79; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 11px;
      width: 100%;
      max-width: 390px;
      position: relative;
      z-index: 1;
    }

    .section-label {
      width: 100%;
      padding: 0 4px;
      margin-top: 0.72rem;
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 500;
      color: var(--smoke);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 52px;
      padding: 13px 18px;
      background: rgba(255, 255, 255, 0.18);
      border: 0.5px solid var(--teal-light);
      border-radius: 18px;
      text-decoration: none;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      font-weight: 400;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      box-shadow: 0 10px 28px rgba(61, 110, 106, 0.055);
      transition: transform 0.22s ease, background 0.22s ease, border-color 0.22s ease;
    }

    .link-btn:hover {
      background: var(--teal-muted);
      border-color: var(--teal);
      transform: translateY(-2px);
    }

    .link-btn.primary {
      border-color: var(--teal);
      background: linear-gradient(135deg, rgba(234, 243, 242, 0.95), rgba(255, 255, 255, 0.28));
      box-shadow: 0 15px 34px rgba(61, 110, 106, 0.11);
    }

    .link-btn.primary:hover {
      background: var(--teal-light);
      border-color: var(--teal-dark);
    }

    .link-icon {
      font-size: 17px;
      color: var(--teal);
      flex-shrink: 0;
      width: 22px;
      text-align: center;
    }

    .link-label { flex: 1; }

    .link-arrow {
      font-size: 13px;
      color: var(--teal-light);
      flex-shrink: 0;
    }

    .footer {
      margin-top: 2.75rem;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--smoke);
      letter-spacing: 1.4px;
      opacity: 0.6;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 390px) {
      .page {
        padding-left: 1rem;
        padding-right: 1rem;
      }

      .link-btn {
        padding: 12px 16px;
        font-size: 11px;
      }

      .social-btn {
        width: 39px;
        height: 39px;
      }
    }
  </style>
</head>
